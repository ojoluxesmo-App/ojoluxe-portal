<!DOCTYPE html> 
<html lang="en">
<head>.from("jobs")
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OJO Luxe Portal</title>

  <style>
    :root {
      --bg: #070707;
      --panel: #111111;
      --panel-2: #161616;
      --border: #262626;
      --gold: #d4af37;
      --gold-soft: #c9a85d;
      --text: #f4f4f4;
      --muted: #a0a0a0;
      --green: #2f7d32;
      --red: #b23b3b;
      --orange: #b76a00;
      --blue: #225b9a;
      --gray: #666666;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 18px 16px;
      border-bottom: 1px solid #1c1c1c;
      color: var(--gold);
      font-size: 20px;
      font-weight: 700;
      background: #050505;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tabs {
    .tab-btn {
      padding: 12px 10px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #0e0e0e;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #1a1405;
      border-color: #6f5712;
      color: var(--gold);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1fr auto;
      gap: 10px;
    }

    h3 {
      color: var(--gold);
      margin: 18px 0 12px;
      font-size: 18px;
    }

    .panel {
      background: transparent;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-soft);
    }

    .full-width {
      grid-column: 1 / -1;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      color: var(--text);
      margin: 0;
    }

    input::placeholder,
    textarea::placeholder {
      color: #7f7f7f;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .primary-btn {
      background: #f2cf00;
      color: #000;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .secondary-btn {
      background: #161616;
      color: var(--gold);
      border: 1px solid #5a4720;
      font-weight: 700;
      cursor: pointer;
    }

    .danger-btn {
      background: #2a1111;
      color: #ff9f9f;
      border: 1px solid #733;
      font-weight: 700;
      cursor: pointer;
    }

    .job-list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, #111111 0%, #090909 100%);
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 10px 30px rgba(0,0,0,0.28);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

   .client-name {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.08;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .job-meta,
    .job-route,
    .job-line,
    .job-driver,
    .job-note {
      font-size: 15px;
      line-height: 1.35;
      margin-top: 4px;
    }

   .job-route {
      font-size: 18px;
      font-weight: 600;
      color: #f0f0f0;
      margin-top: 6px;
    }

    .job-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #6a5520;
      color: var(--gold);
      background: linear-gradient(180deg, #161616 0%, #101010 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .badge.status-offer { border-color: #5e5e5e; color: #d0d0d0; }
    .badge.status-assigned { border-color: #7a5f12; color: #f2cf63; }
    .badge.status-accepted { border-color: #8d6b0b; color: #ffd45a; }
    .badge.status-heading-to-pickup { border-color: #8b5d00; color: #ffc266; }
    .badge.status-arrived { border-color: #8c7400; color: #ffe06a; }
    .badge.status-in-progress { border-color: #2e6099; color: #89c2ff; }
    .badge.status-completed { border-color: #2f7d32; color: #87e18b; }
    .badge.status-released { border-color: #4d6f91; color: #a7c6e6; }
    .badge.status-cancelled { border-color: #a33a3a; color: #ff8b8b; }

    .badge.urgency-critical {
      border-color: #c0392b;
      color: #ff9a92;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.35);
    }
    .badge.urgency-urgent { border-color: #d35400; color: #ffbb80; }
    .badge.urgency-high { border-color: #b7950b; color: #ffe178; }
    .badge.urgency-medium { border-color: #2e86c1; color: #8fd3ff; }
    .badge.urgency-low { border-color: #5d6d7e; color: #c9d4df; }
    .badge.urgency-past-due { border-color: #7b241c; color: #ff8b8b; }

    .assign-row,
    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .card-actions-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

   .small-btn {
      padding: 11px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
    }

.status-btn {
      background: linear-gradient(180deg, #201805 0%, #151005 100%);
      color: #f2cf63;
      border: 1px solid #7a5f12;
      box-shadow: 0 0 10px rgba(212,175,55,0.12);
    }

    .assign-btn {
      background: #0f0f0f;
      color: white;
      border: 1px solid #2f2f2f;
    }

    .empty-state {
      color: var(--muted);
      padding: 12px 0;
    }

    .hidden {
      display: none;
    }

    .count-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .count-pill {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 6px 10px;
      background: #101010;
    }

    .edit-mode {
      color: #9fe6a0;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .search-row {
        grid-template-columns: 1fr 1fr;
      }
    }

   @media (max-width: 700px) {
      .tabs,
      .search-row {
        grid-template-columns: 1fr;
      }

      .assign-row,
      .card-actions {
        grid-template-columns: 1fr;
      }

      .card-actions-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .card {
        padding: 16px;
        border-radius: 16px;
      }

      .client-name {
        font-size: 20px;
      }

      .job-route {
        font-size: 17px;
      }

      .badge {
        font-size: 11px;
        padding: 6px 10px;
      }
    }
  </style>
</head>

    const STATUS_FLOW = [
      "Offer",
      "Assigned",

    function addStop(value = "") {
  const container = document.getElementById("stopsContainer");
  const count = container.children.length;

  if (count >= 5) {
    alert("Max 5 stops only");
    return;
  }

  const div = document.createElement("div");
  div.className = "field-row";

  div.innerHTML = `
    <input placeholder="Stop address" value="${value}" />
    <button type="button" class="danger-btn" onclick="this.parentElement.remove()">Remove</button>
  `;

  container.appendChild(div);
}

function getStops() {
  const inputs = document.querySelectorAll("#stopsContainer input");
  const stops = [];

  inputs.forEach((input, index) => {
    if (input.value.trim()) {
      stops.push({
        order: index + 1,
        address: input.value.trim()
      });
    }
  });

  return stops;
}

function setStops(stops = []) {
  const container = document.getElementById("stopsContainer");
  container.innerHTML = "";

  stops.forEach(s => addStop(s.address));
}
    let currentTab = "offers";
    let editingId = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeClassName(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function buildPickupDateTime(dateStr, timeStr) {
      if (!dateStr) return null;
      const time = timeStr && timeStr.trim() ? timeStr.trim() : "12:00";
      const dt = new Date(`${dateStr}T${time}:00`);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function getUrgencyLevel(dateStr, timeStr) {
      const pickup = buildPickupDateTime(dateStr, timeStr);
      if (!pickup) return "Low";

      const now = new Date();
      const diffMs = pickup.getTime() - now.getTime();
      const diffHours = diffMs / (1000 * 60 * 60);

      if (diffHours < 0) return "Past Due";
      if (diffHours <= 4) return "Critical";
      if (diffHours <= 12) return "Urgent";
      if (diffHours <= 36) return "High";
      if (diffHours <= 168) return "Medium";
      return "Low";
    }

    function getNextStatus(currentStatus) {
      const current = STATUS_FLOW.indexOf(currentStatus);
      if (current === -1) return "Assigned";
      if (current >= STATUS_FLOW.length - 1) return STATUS_FLOW[STATUS_FLOW.length - 1];
      return STATUS_FLOW[current + 1];
    }

    function refreshDriverSuggestions(jobs = []) {
      const set = new Set(DRIVER_NAMES);

      jobs.forEach((job) => {
        if (job.assigned_driver && String(job.assigned_driver).trim()) {
          set.add(String(job.assigned_driver).trim());
        }
      });

      const names = Array.from(set).sort((a, b) => a.localeCompare(b));

      document.getElementById("driverSuggestions").innerHTML = names
        .map((name) => `<option value="${escapeHtml(name)}"></option>`)
        .join("");

      document.getElementById("filterDriver").innerHTML =
        `<option value="">All Drivers</option>` +
        names.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
    }

    function setActiveTabButton() {
      ["offers", "active", "done", "post"].forEach((tab) => {
        document.getElementById(`tab-${tab}`).classList.toggle("active", currentTab === tab);
      });
    }

    function setTab(tab) {
      currentTab = tab;
      setActiveTabButton();

      const postPanel = document.getElementById("postPanel");
      const listPanel = document.getElementById("listPanel");
      const listTitle = document.getElementById("listTitle");

      if (tab === "post") {
        postPanel.classList.remove("hidden");
        listPanel.classList.add("hidden");
      } else {
        postPanel.classList.add("hidden");
        listPanel.classList.remove("hidden");
        listTitle.textContent =
          tab === "offers" ? "📋 Offers" :
          tab === "active" ? "🚘 Active Jobs" :
          "✅ Done Jobs";
        renderJobs();
      }
    }

    function getJobsForCurrentTab(jobs) {
      if (currentTab === "offers") {
        return jobs.filter(j => (j.status || "Offer") === "Offer");
      }

      if (currentTab === "active") {
        return jobs.filter(j => ["Assigned", "Accepted", "Heading to Pickup", "Arrived", "In Progress"].includes(j.status || ""));
      }

      if (currentTab === "done") {
        return jobs.filter(j => ["Completed", "Released", "Cancelled"].includes(j.status || ""));
      }

      return jobs;
    }

    function resetFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("filterUrgency").value = "";
      document.getElementById("filterDriver").value = "";
      document.getElementById("filterPayment").value = "";
      renderJobs();
    }

    function populateCounts() {
      const offers = allJobs.filter(j => (j.status || "Offer") === "Offer").length;
      const active = allJobs.filter(j => ["Assigned", "Accepted", "Heading to Pickup", "Arrived", "In Progress"].includes(j.status || "")).length;
      const done = allJobs.filter(j => ["Completed", "Released", "Cancelled"].includes(j.status || "")).length;
      const critical = allJobs.filter(j => getUrgencyLevel(j.date, j.pickup_time) === "Critical").length;

      document.getElementById("countsRow").innerHTML = `
        <div class="count-pill">Offers: ${offers}</div>
        <div class="count-pill">Active: ${active}</div>
        <div class="count-pill">Done: ${done}</div>
        <div class="count-pill">Critical: ${critical}</div>
      `;
    }

    function fillForm(job) {
      editingId = job.id;
      document.getElementById("name").value = job.client || "";
      document.getElementById("date").value = job.date || "";
      document.getElementById("pickupTime").value = job.pickup_time || "";
      document.getElementById("from").value = job.from_loc || "";
      document.getElementById("to").value = job.to_loc || "";
      document.getElementById("jobType").value = job.job_type || "Airport Transfer";
      document.getElementById("vehicleType").value = job.vehicle_type || "Premium SUV";
      document.getElementById("paymentType").value = job.payment_type || "Cash";
      document.getElementById("jobStatus").value = job.status || "Offer";
      document.getElementById("assignedDriver").value = job.assigned_driver || "";
      document.getElementById("waybillNotes").value = job.waybill_notes || "";

      document.getElementById("saveBtn").textContent = "Update Booking";
      document.getElementById("cancelEditBtn").classList.remove("hidden");
      document.getElementById("editModeLabel").classList.remove("hidden");
      document.getElementById("formTitle").textContent = "✏️ Edit Booking";

      setTab("post");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelEdit() {
      editingId = null;
      clearForm();
      document.getElementById("saveBtn").textContent = "Save Booking";
      document.getElementById("cancelEditBtn").classList.add("hidden");
      document.getElementById("editModeLabel").classList.add("hidden");
      document.getElementById("formTitle").textContent = "➕ New Booking";
    }

    async function saveJob() {
      const client = document.getElementById("name").value.trim();
      const date = document.getElementById("date").value;
      const pickupTime = document.getElementById("pickupTime").value;
      const fromLoc = document.getElementById("from").value.trim();
      const toLoc = document.getElementById("to").value.trim();

      if (!client || !date || !fromLoc || !toLoc) {
        alert("Please fill Client Name, Pickup Date, From, and To.");
        return;
      }

const payload = {
        client: client,
        date: date,
        pickup_time: pickupTime || "",
        from_loc: fromLoc,
        to_loc: toLoc,
        stops: getStops(),
        job_type: document.getElementById("jobType").value,
        vehicle_type: document.getElementById("vehicleType").value,
        payment_type: document.getElementById("paymentType").value,
        status: document.getElementById("jobStatus").value,
        assigned_driver: document.getElementById("assignedDriver").value.trim(),
        waybill_notes: document.getElementById("waybillNotes").value.trim(),
        urgency_level: getUrgencyLevel(date, pickupTime)
      };

      let error;

      if (editingId) {
        ({ error } = await db.from("jobs").update(payload).eq("id", editingId));
      } else {
        ({ error } = await db.from("jobs").insert([payload]));
      }

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      alert(editingId ? "Updated!" : "Saved!");
      cancelEdit();
      await loadJobs();
      setTab("offers");
    }

    function clearForm() {
      document.getElementById("name").value = "";
      document.getElementById("date").value = "";
      document.getElementById("pickupTime").value = "";
      document.getElementById("from").value = "";
      document.getElementById("to").value = "";
      document.getElementById("jobType").value = "Airport Transfer";
      document.getElementById("vehicleType").value = "Premium SUV";
      document.getElementById("paymentType").value = "Cash";
      document.getElementById("jobStatus").value = "Offer";
      document.getElementById("assignedDriver").value = "";
      document.getElementById("waybillNotes").value = "";
    }

    async function updateStatus(jobId, currentStatus) {
      const nextStatus = getNextStatus(currentStatus);

      const { error } = await db
        .from("jobs")
        .update({ status: nextStatus })
        .eq("id", jobId);

      if (error) {
        alert("Status update failed: " + error.message);
        return;
      }

      await loadJobs();
    }

async function dispatchJob(jobId) {
      const job = allJobs.find(j => String(j.id) === String(jobId));
      const assignedDriver = job?.assigned_driver ? String(job.assigned_driver).trim() : "";

      if (!assignedDriver) {
        alert("Assign driver in Edit first, then dispatch.");
        return;
      }

      const { error } = await db
        .from("jobs")
        .update({
          status: "Assigned"
        })
        .eq("id", jobId);

      if (error) {
        alert("Dispatch failed: " + error.message);
        return;
      }

      await loadJobs();
    }

    async function updateAssignedDriver(jobId) {
      const input = document.getElementById(`driver-${jobId}`);
      if (!input) return;

      const assignedDriver = input.value.trim();

      const { error } = await db
        .from("jobs")
        .update({ assigned_driver: assignedDriver })
        .eq("id", jobId);

      if (error) {
        alert("Driver update failed: " + error.message);
        return;
      }

      await loadJobs();
    }

    async function deleteJob(jobId) {
      const confirmed = confirm("Delete this job?");
      if (!confirmed) return;

      const { error } = await db
        .from("jobs")
        .delete()
        .eq("id", jobId);

      if (error) {
        alert("Delete failed: " + error.message);
        return;
      }

      await loadJobs();
    }

    function openMap(address) {
      if (!address) return;
      const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
      window.open(url, "_blank");
    }

    function showWaybill(jobId) {
      const job = allJobs.find(j => String(j.id) === String(jobId));
      if (!job) return;

      alert(
        `WAYBILL PREVIEW\n\n` +
        `Client: ${job.client || "-"}\n` +
        `Date: ${job.date || "-"}\n` +
        `Time: ${job.pickup_time || "-"}\n` +
        `From: ${job.from_loc || "-"}\n` +
        `To: ${job.to_loc || "-"}\n` +
        `Vehicle: ${job.vehicle_type || "-"}\n` +
        `Driver: ${job.assigned_driver || "Unassigned"}\n` +
        `Status: ${job.status || "Offer"}\n` +
        `Notes: ${job.waybill_notes || "-"}`
      );
    }

    function renderJobs() {
      populateCounts();

      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const urgencyFilter = document.getElementById("filterUrgency").value;
      const driverFilter = document.getElementById("filterDriver").value;
      const paymentFilter = document.getElementById("filterPayment").value;

      let jobs = getJobsForCurrentTab(allJobs);

      jobs = jobs.filter((j) => {
        const urgency = getUrgencyLevel(j.date, j.pickup_time);
        const searchText = `${j.client || ""} ${j.from_loc || ""} ${j.to_loc || ""}`.toLowerCase();

        if (search && !searchText.includes(search)) return false;
        if (urgencyFilter && urgency !== urgencyFilter) return false;
        if (driverFilter && (j.assigned_driver || "") !== driverFilter) return false;
        if (paymentFilter && (j.payment_type || "") !== paymentFilter) return false;

        return true;
      });

      if (jobs.length === 0) {
        document.getElementById("jobs").innerHTML =
          `<div class="empty-state">No jobs in this section.</div>`;
        return;
      }

      let html = "";

      jobs.forEach((j) => {
        const urgency = getUrgencyLevel(j.date, j.pickup_time);
        const currentStatus = j.status || "Offer";
        const nextStatus = getNextStatus(currentStatus);
        const isCompleted = currentStatus === "Completed";

        html += `
          <div class="card">
<div class="card-top">
              <div>
                <div class="job-meta" style="color: var(--gold-soft); font-weight: 700; letter-spacing: 0.4px;">
                  ${escapeHtml(j.reference_code || "OJO JOB")}
                </div>
                <div class="client-name">${escapeHtml(j.client || "-")}</div>
                <div class="job-meta">${escapeHtml(j.date || "-")}${j.pickup_time ? ` • ${escapeHtml(j.pickup_time)}` : ""}</div>
                <div class="job-route">${escapeHtml(j.from_loc || "-")} → ${escapeHtml(j.to_loc || "-")}</div>
              </div>
            </div>
${Array.isArray(j.stops) && j.stops.length > 0 ? `
  <div class="job-line">
    <strong>Stops:</strong>
    ${j.stops.map(s => `📍 ${escapeHtml(s.address)}`).join("<br>")}
  </div>
` : ""}
           <div class="job-badges">
  <span class="badge">${escapeHtml(j.job_type || "Airport Transfer")}</span>
  <span class="badge">${escapeHtml(j.vehicle_type || j.vehicle || "-")}</span>
  <span class="badge">${escapeHtml(j.payment_type || "Cash")}</span>

${Array.isArray(j.stops) && j.stops.length > 0 ? `
  <span class="badge">${j.stops.length} Stops</span>
` : ""}

  <span class="badge status-${normalizeClassName(currentStatus)}">${escapeHtml(currentStatus)}</span>
  <span class="badge urgency-${normalizeClassName(urgency)}">${escapeHtml(urgency)}</span>
</div>

<div class="job-line" style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
  <div><strong>Status:</strong> ${escapeHtml(currentStatus)}</div>
  <div><strong>Urgency:</strong> ${escapeHtml(urgency)}</div>
</div>
            <div class="job-driver">
              <strong>Driver:</strong>
              <span style="color:${j.assigned_driver ? '#87e18b' : '#aaa'}">
                ${escapeHtml(j.assigned_driver || "Unassigned")}
              </span>
            </div>

            <div class="job-note"><strong>Notes:</strong> ${escapeHtml(j.waybill_notes || "-")}</div>

            <div class="job-driver">
  <strong>Driver:</strong>
  <span style="color:${j.assigned_driver ? '#87e18b' : '#aaa'}">
    ${escapeHtml(j.assigned_driver || "Unassigned")}
  </span>
</div>

            <div class="card-actions-3">
              <button class="small-btn secondary-btn" onclick="showWaybill('${j.id}')">Waybill</button>
              <button class="small-btn assign-btn" onclick="dispatchJob('${j.id}')">Dispatch</button>
              <button class="small-btn danger-btn" onclick="deleteJob('${j.id}')">Delete</button>
            </div>

            <div class="card-actions">
              <button
                class="small-btn status-btn"
                ${isCompleted ? "disabled style='opacity:0.45;cursor:not-allowed'" : ""}
                ${isCompleted ? "" : `onclick="updateStatus('${j.id}', '${escapeHtml(currentStatus)}')"`}>
             ${isCompleted ? "Completed" : getStatusActionLabel(currentStatus)}
              </button>
              <button class="small-btn secondary-btn" onclick="fillForm(${JSON.stringify(j).replace(/"/g, '&quot;')})">Edit</button>
            </div>
          </div>
        `;
      });

      document.getElementById("jobs").innerHTML = html;
    }
function getStatusActionLabel(status) {
  switch (status) {
    case "Assigned":
      return "Start Trip";
    case "Accepted":
      return "Heading to Pickup";
    case "Heading to Pickup":
      return "Arrived";
    case "Arrived":
      return "Start Ride";
    case "In Progress":
      return "Complete Trip";
    default:
      return "Update Status";
  }
}
    async function loadJobs() {
      const { data, error } = await db
        .from("jobs")
        .select("*")
        .order("date", { ascending: true })
        .order("pickup_time", { ascending: true });

      if (error) {
        document.getElementById("jobs").innerHTML =
          `<div class="empty-state">Load error: ${escapeHtml(error.message)}</div>`;
        return;
      }

      allJobs = data || [];
      refreshDriverSuggestions(allJobs);
      renderJobs();
    }

    setActiveTabButton();
    loadJobs();
  </script>
</body>
</html>
