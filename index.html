<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OJO Luxe Portal</title>

  <style>
    :root {
      --bg: #070707;
      --panel: #101010;
      --panel-2: #151515;
      --border: #262626;
      --gold: #d4af37;
      --gold-soft: #c9a85d;
      --text: #f4f4f4;
      --muted: #9f9f9f;
      --green: #2f7d32;
      --red: #b23b3b;
      --orange: #b76a00;
      --blue: #225b9a;
      --gray: #666;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 18px 16px;
      border-bottom: 1px solid #1c1c1c;
      color: var(--gold);
      font-size: 20px;
      font-weight: 700;
      background: #050505;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 16px;
    }

    h3 {
      color: var(--gold);
      margin: 18px 0 12px;
      font-size: 18px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-soft);
    }

    .full-width {
      grid-column: 1 / -1;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      color: var(--text);
      margin: 0;
    }

    input::placeholder,
    textarea::placeholder {
      color: #7f7f7f;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .primary-btn {
      background: #f2cf00;
      color: #000;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-top: 4px;
    }

    .primary-btn:hover {
      filter: brightness(1.03);
    }

    .job-list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, #111 0%, #0b0b0b 100%);
      border: 1px solid #202020;
      border-radius: 14px;
      padding: 16px;
    }

    .client-name {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .job-meta,
    .job-route,
    .job-line,
    .job-driver,
    .job-note {
      font-size: 15px;
      line-height: 1.35;
      margin-top: 4px;
    }

    .job-route {
      font-size: 20px;
      font-weight: 500;
    }

    .job-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #5a4720;
      color: var(--gold);
      background: #151515;
    }

    .badge.status-offer { border-color: #5e5e5e; color: #d0d0d0; }
    .badge.status-assigned { border-color: #7a5f12; color: #f2cf63; }
    .badge.status-accepted { border-color: #8d6b0b; color: #ffd45a; }
    .badge.status-heading-to-pickup { border-color: #8b5d00; color: #ffc266; }
    .badge.status-arrived { border-color: #8c7400; color: #ffe06a; }
    .badge.status-in-progress { border-color: #2e6099; color: #89c2ff; }
    .badge.status-completed { border-color: #2f7d32; color: #87e18b; }
    .badge.status-released { border-color: #4d6f91; color: #a7c6e6; }
    .badge.status-cancelled { border-color: #a33a3a; color: #ff8b8b; }

    .badge.urgency-critical { border-color: #c0392b; color: #ff9a92; }
    .badge.urgency-urgent { border-color: #d35400; color: #ffbb80; }
    .badge.urgency-high { border-color: #b7950b; color: #ffe178; }
    .badge.urgency-medium { border-color: #2e86c1; color: #8fd3ff; }
    .badge.urgency-low { border-color: #5d6d7e; color: #c9d4df; }
    .badge.urgency-past-due { border-color: #7b241c; color: #ff8b8b; }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .small-btn {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .status-btn {
      background: #1a1a1a;
      color: var(--gold);
      border: 1px solid #5a4720;
    }

    .assign-btn {
      background: #0f0f0f;
      color: white;
      border: 1px solid #2f2f2f;
    }

    .assign-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 10px;
    }

    .empty-state {
      color: var(--muted);
      padding: 12px 0;
    }

    .helper {
      color: var(--muted);
      font-size: 12px;
      margin-top: -2px;
    }

    @media (max-width: 700px) {
      .card-actions,
      .assign-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">OJO Luxe Portal</div>

  <div class="container">
    <h3>➕ New Booking</h3>

    <div class="stack">
      <input id="name" placeholder="Client Name" />

      <div class="field-row">
        <div class="field-group">
          <label for="date">Pickup Date</label>
          <input id="date" type="date" />
        </div>

        <div class="field-group">
          <label for="pickupTime">Pickup Time</label>
          <input id="pickupTime" type="time" />
        </div>
      </div>

      <input id="from" placeholder="From" />
      <input id="to" placeholder="To" />

      <div class="field-row">
        <div class="field-group">
          <label for="jobType">Job Type</label>
          <select id="jobType">
            <option value="Airport Transfer">Airport Transfer</option>
            <option value="Point to Point">Point to Point</option>
            <option value="Hourly">Hourly</option>
          </select>
        </div>

        <div class="field-group">
          <label for="vehicleType">Vehicle Type</label>
          <select id="vehicleType">
            <option value="Mini Van">Mini Van</option>
            <option value="Premium Sedan">Premium Sedan</option>
            <option value="Premium SUV" selected>Premium SUV</option>
            <option value="Sprinter">Sprinter</option>
          </select>
        </div>

        <div class="field-group">
          <label for="paymentType">Payment Type</label>
          <select id="paymentType">
            <option value="Cash">Cash</option>
            <option value="Zelle">Zelle</option>
            <option value="Venmo">Venmo</option>
            <option value="Apple Cash">Apple Cash</option>
            <option value="Credit Card">Credit Card</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="jobStatus">Status</label>
          <select id="jobStatus">
            <option value="Offer">Offer</option>
            <option value="Assigned">Assigned</option>
            <option value="Accepted">Accepted</option>
            <option value="Heading to Pickup">Heading to Pickup</option>
            <option value="Arrived">Arrived</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Released">Released</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>

        <div class="field-group">
          <label for="assignedDriver">Assigned Driver</label>
          <input id="assignedDriver" list="driverSuggestions" placeholder="Type 1–2 letters of driver name" />
          <div class="helper">Autocomplete works from saved driver names + default list.</div>
        </div>
      </div>

      <div class="field-group full-width">
        <label for="waybillNotes">Waybill Notes</label>
        <textarea id="waybillNotes" placeholder="Notes for chauffeur / dispatch"></textarea>
      </div>

      <button class="primary-btn" onclick="saveJob()">Save Booking</button>
    </div>

    <h3>📋 Job List</h3>
    <div id="jobs" class="job-list"></div>
  </div>

  <datalist id="driverSuggestions"></datalist>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://aadlqagpxwshpdccxwto.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhZGxxYWdweHdzaHBkY2N4d3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzYyODQsImV4cCI6MjA4OTcxMjI4NH0.MaNNRIcsD6aDizz2J4YzqXzkn32RhwJZqHM61t-TLYg";

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const STATUS_FLOW = [
      "Offer",
      "Assigned",
      "Accepted",
      "Heading to Pickup",
      "Arrived",
      "In Progress",
      "Completed"
    ];

    const DRIVER_NAMES = [
      "Steven",
      "Steventh",
      "Silas",
      "David",
      "Yansen",
      "Riana",
      "Adi",
      "Charles",
      "Dewi",
      "Wicky",
      "Nery",
      "Jonathan"
    ];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeClassName(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function buildPickupDateTime(dateStr, timeStr) {
      if (!dateStr) return null;
      const time = timeStr && timeStr.trim() ? timeStr.trim() : "12:00";
      const dt = new Date(`${dateStr}T${time}:00`);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function getUrgencyLevel(dateStr, timeStr) {
      const pickup = buildPickupDateTime(dateStr, timeStr);
      if (!pickup) return "Low";

      const now = new Date();
      const diffMs = pickup.getTime() - now.getTime();
      const diffHours = diffMs / (1000 * 60 * 60);

      if (diffHours < 0) return "Past Due";
      if (diffHours <= 4) return "Critical";
      if (diffHours <= 12) return "Urgent";
      if (diffHours <= 36) return "High";
      if (diffHours <= 168) return "Medium";
      return "Low";
    }

    function getNextStatus(currentStatus) {
      const current = STATUS_FLOW.indexOf(currentStatus);
      if (current === -1) return "Assigned";
      if (current >= STATUS_FLOW.length - 1) return STATUS_FLOW[STATUS_FLOW.length - 1];
      return STATUS_FLOW[current + 1];
    }

    function refreshDriverSuggestions(jobs = []) {
      const set = new Set(DRIVER_NAMES);

      jobs.forEach((job) => {
        if (job.assigned_driver && String(job.assigned_driver).trim()) {
          set.add(String(job.assigned_driver).trim());
        }
      });

      const names = Array.from(set).sort((a, b) => a.localeCompare(b));
      document.getElementById("driverSuggestions").innerHTML = names
        .map((name) => `<option value="${escapeHtml(name)}"></option>`)
        .join("");
    }

    async function saveJob() {
      const client = document.getElementById("name").value.trim();
      const date = document.getElementById("date").value;
      const pickupTime = document.getElementById("pickupTime").value;
      const fromLoc = document.getElementById("from").value.trim();
      const toLoc = document.getElementById("to").value.trim();

      if (!client || !date || !fromLoc || !toLoc) {
        alert("Please fill Client Name, Pickup Date, From, and To.");
        return;
      }

      const job = {
        client: client,
        date: date,
        pickup_time: pickupTime || "",
        from_loc: fromLoc,
        to_loc: toLoc,
        job_type: document.getElementById("jobType").value,
        vehicle_type: document.getElementById("vehicleType").value,
        payment_type: document.getElementById("paymentType").value,
        status: document.getElementById("jobStatus").value,
        assigned_driver: document.getElementById("assignedDriver").value.trim(),
        waybill_notes: document.getElementById("waybillNotes").value.trim(),
        urgency_level: getUrgencyLevel(date, pickupTime)
      };

      const { error } = await db.from("jobs").insert([job]);

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      alert("Saved!");
      clearForm();
      await loadJobs();
    }

    function clearForm() {
      document.getElementById("name").value = "";
      document.getElementById("date").value = "";
      document.getElementById("pickupTime").value = "";
      document.getElementById("from").value = "";
      document.getElementById("to").value = "";
      document.getElementById("jobType").value = "Airport Transfer";
      document.getElementById("vehicleType").value = "Premium SUV";
      document.getElementById("paymentType").value = "Cash";
      document.getElementById("jobStatus").value = "Offer";
      document.getElementById("assignedDriver").value = "";
      document.getElementById("waybillNotes").value = "";
    }

    async function updateStatus(jobId, currentStatus) {
      const nextStatus = getNextStatus(currentStatus);

      const { error } = await db
        .from("jobs")
        .update({ status: nextStatus })
        .eq("id", jobId);

      if (error) {
        alert("Status update failed: " + error.message);
        return;
      }

      await loadJobs();
    }

    async function updateAssignedDriver(jobId) {
      const input = document.getElementById(`driver-${jobId}`);
      if (!input) return;

      const assignedDriver = input.value.trim();

      const { error } = await db
        .from("jobs")
        .update({ assigned_driver: assignedDriver })
        .eq("id", jobId);

      if (error) {
        alert("Driver update failed: " + error.message);
        return;
      }

      await loadJobs();
    }

    async function loadJobs() {
      const { data, error } = await db
        .from("jobs")
        .select("*")
        .order("date", { ascending: true })
        .order("pickup_time", { ascending: true });

      if (error) {
        document.getElementById("jobs").innerHTML =
          `<div class="empty-state">Load error: ${escapeHtml(error.message)}</div>`;
        return;
      }

      const jobs = data || [];
      refreshDriverSuggestions(jobs);

      if (jobs.length === 0) {
        document.getElementById("jobs").innerHTML =
          `<div class="empty-state">No jobs yet.</div>`;
        return;
      }

      let html = "";

      jobs.forEach((j) => {
        const urgency = getUrgencyLevel(j.date, j.pickup_time);
        const nextStatus = getNextStatus(j.status || "Offer");

        html += `
          <div class="card">
            <div class="client-name">${escapeHtml(j.client || "-")}</div>
            <div class="job-meta">${escapeHtml(j.date || "-")} ${j.pickup_time ? "• " + escapeHtml(j.pickup_time) : ""}</div>
            <div class="job-route">${escapeHtml(j.from_loc || "-")} → ${escapeHtml(j.to_loc || "-")}</div>

            <div class="job-badges">
              <span class="badge">${escapeHtml(j.job_type || "Airport Transfer")}</span>
              <span class="badge">${escapeHtml(j.vehicle_type || "-")}</span>
              <span class="badge">${escapeHtml(j.payment_type || "Cash")}</span>
              <span class="badge status-${normalizeClassName(j.status || "Offer")}">${escapeHtml(j.status || "Offer")}</span>
              <span class="badge urgency-${normalizeClassName(urgency)}">${escapeHtml(urgency)}</span>
            </div>

            <div class="job-driver"><strong>Driver:</strong> ${escapeHtml(j.assigned_driver || "Unassigned")}</div>
            <div class="job-note"><strong>Notes:</strong> ${escapeHtml(j.waybill_notes || "-")}</div>

            <div class="assign-row">
              <input
                id="driver-${j.id}"
                list="driverSuggestions"
                placeholder="Type driver name"
                value="${escapeHtml(j.assigned_driver || "")}"
              />
              <button class="small-btn assign-btn" onclick="updateAssignedDriver('${j.id}')">Assign Driver</button>
            </div>

            <div class="card-actions">
              <button class="small-btn status-btn" onclick="updateStatus('${j.id}', '${escapeHtml(j.status || "Offer")}')">
                Next Status: ${escapeHtml(nextStatus)}
              </button>
            </div>
          </div>
        `;
      });

      document.getElementById("jobs").innerHTML = html;
    }

    loadJobs();
  </script>
</body>
</html>
