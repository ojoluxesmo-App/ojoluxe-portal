   /* ── Dispatch Modal ── */
.dispatch-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.dispatch-overlay.active { display: flex; }

.dispatch-modal {
  background: linear-gradient(180deg, #141414 0%, #0e0e0e 100%);
  border: 1px solid #3a2e10;
  border-radius: 18px;
  padding: 28px 22px 22px;
  width: min(94vw, 400px);
  box-shadow: 0 0 0 1px rgba(212,175,55,0.12), 0 24px 60px rgba(0,0,0,0.7);
  color: var(--text);
}
.dispatch-modal h3 {
  margin: 0 0 4px;
  font-size: 17px;
  font-weight: 800;
  color: var(--gold);
}
.dispatch-job-info {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
  line-height: 1.4;
}
.dispatch-current-driver {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}
.dispatch-current-driver span { color: #87e18b; font-weight: 700; }
.dispatch-input-wrap { position: relative; margin-bottom: 16px; }
.dispatch-input-wrap input {
  width: 100%;
  padding: 13px 14px;
  border-radius: 10px;
  border: 1px solid #3a2e10;
  background: #0a0a0a;
  color: var(--text);
  font-size: 15px;
  box-sizing: border-box;
  outline: none;
  transition: border-color 0.2s;
}
.dispatch-input-wrap input:focus { border-color: var(--gold-soft); }
#dispatchSuggestions {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: #131313;
  border: 1px solid #3a2e10;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
  list-style: none;
  margin: 0; padding: 4px 0;
  z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
#dispatchSuggestions li {
  padding: 11px 14px;
  cursor: pointer;
  font-size: 14px;
  color: #e0e0e0;
  border-radius: 6px;
  margin: 2px 4px;
  transition: background 0.12s;
}
#dispatchSuggestions li:hover,
#dispatchSuggestions li.highlighted {
  background: #1e1806;
  color: var(--gold);
}
.dispatch-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.dispatch-actions button {
  padding: 13px 10px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  min-height: 48px;
  transition: opacity 0.2s, transform 0.1s;
}
.dispatch-actions button:active { transform: scale(0.97); }
.dispatch-actions button:hover { opacity: 0.88; }
.btn-dispatch-cancel {
  background: #1a1a1a;
  color: var(--muted);
  border: 1px solid #2a2a2a !important;
}
.btn-dispatch-confirm {
  background: linear-gradient(180deg, #f2cf00 0%, #d4af37 100%);
  color: #000;
}
  </style>

    function addStop(value = "") {

function getStops() {

        order: index + 1,
        address: input.value.trim()

    let currentTab = "offers";
    let editingId = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeClassName(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function buildPickupDateTime(dateStr, timeStr) {
      if (!dateStr) return null;
      const time = timeStr && timeStr.trim() ? timeStr.trim() : "12:00";
      const dt = new Date(`${dateStr}T${time}:00`);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function getUrgencyLevel(dateStr, timeStr) {
      const pickup = buildPickupDateTime(dateStr, timeStr);
      if (!pickup) return "Low";

      const now = new Date();
      const diffMs = pickup.getTime() - now.getTime();
      const diffHours = diffMs / (1000 * 60 * 60);

      if (diffHours < 0) return "Past Due";
      if (diffHours <= 4) return "Critical";
      if (diffHours <= 12) return "Urgent";
      if (diffHours <= 36) return "High";
      if (diffHours <= 168) return "Medium";
      return "Low";
    }

    function getNextStatus(currentStatus) {
      const current = STATUS_FLOW.indexOf(currentStatus);
      if (current === -1) return "Assigned";
      if (current >= STATUS_FLOW.length - 1) return STATUS_FLOW[STATUS_FLOW.length - 1];
      return STATUS_FLOW[current + 1];
    }

    function refreshDriverSuggestions(jobs = []) {
      const set = new Set(DRIVER_NAMES);

      jobs.forEach((job) => {
        if (job.assigned_driver && String(job.assigned_driver).trim()) {
          set.add(String(job.assigned_driver).trim());
        }
      });

      const names = Array.from(set).sort((a, b) => a.localeCompare(b));

      document.getElementById("driverSuggestions").innerHTML = names
        .map((name) => `<option value="${escapeHtml(name)}"></option>`)
        .join("");

      document.getElementById("filterDriver").innerHTML =
        `<option value="">All Drivers</option>` +
        names.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
    }

    function setActiveTabButton() {
      ["offers", "active", "done", "post"].forEach((tab) => {
        document.getElementById(`tab-${tab}`).classList.toggle("active", currentTab === tab);
      });
    }

    function setTab(tab) {
      currentTab = tab;
      setActiveTabButton();

      const postPanel = document.getElementById("postPanel");
      const listPanel = document.getElementById("listPanel");
      const listTitle = document.getElementById("listTitle");

      if (tab === "post") {
        postPanel.classList.remove("hidden");
        listPanel.classList.add("hidden");
      } else {
        postPanel.classList.add("hidden");
        listPanel.classList.remove("hidden");
        listTitle.textContent =
          tab === "offers" ? "📋 Offers" :
          tab === "active" ? "🚘 Active Jobs" :
          "✅ Done Jobs";
        renderJobs();
      }
    }

    function getJobsForCurrentTab(jobs) {
  if (!Array.isArray(jobs)) return [];

  if (currentTab === "offers") {
    return jobs.filter(j => !j.status || j.status === "Offer");
  }

  if (currentTab === "active") {
    return jobs.filter(j =>
      ["Assigned", "Accepted", "Heading to Pickup", "Arrived", "In Progress"].includes(j.status)
    );
  }

  if (currentTab === "done") {
    return jobs.filter(j => j.status === "Completed");
  }

  return jobs;
}

    function resetFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("filterUrgency").value = "";
      document.getElementById("filterDriver").value = "";

      renderJobs();
    }

    function populateCounts() {
      const offers = allJobs.filter(j => (j.status || "Offer") === "Offer").length;
      const active = allJobs.filter(j => ["Assigned", "Accepted", "Heading to Pickup", "Arrived", "In Progress"].includes(j.status || "")).length;
      const done = allJobs.filter(j => ["Completed", "Released", "Cancelled"].includes(j.status || "")).length;
      const critical = allJobs.filter(j => getUrgencyLevel(j.date, j.pickup_time) === "Critical").length;

      document.getElementById("countsRow").innerHTML = `
        <div class="count-pill">Offers: ${offers}</div>
        <div class="count-pill">Active: ${active}</div>
        <div class="count-pill">Done: ${done}</div>
        <div class="count-pill">Critical: ${critical}</div>
      `;
    }

  if (choice) {

    return;
  }

  const secondChoice = confirm("Open Waze?\n\nOK = Waze\nCancel = Apple Maps");

  if (secondChoice) {
    window.open(`https://waze.com/ul?q=${encoded}`, "_blank");
  } else {
    window.open(`https://maps.apple.com/?q=${encoded}`, "_blank");
  }
}

function fillFormById(id) {

    function fillForm(job) {

      document.getElementById("name").value = job.client || "";
      document.getElementById("date").value = job.date || "";
      document.getElementById("pickupTime").value = job.pickup_time || "";
      document.getElementById("from").value = job.from_loc || "";
      document.getElementById("to").value = job.to_loc || "";
      document.getElementById("jobType").value = job.job_type || "Airport Transfer";
      document.getElementById("vehicleType").value = job.vehicle_type || "Premium SUV";
      document.getElementById("paymentType").value = job.payment_type || "Cash";
      document.getElementById("jobStatus").value = job.status || "Offer";
      document.getElementById("assignedDriver").value = job.assigned_driver || "";

    function cancelEdit() {
      editingId = null;
      clearForm();
      document.getElementById("saveBtn").textContent = "Save Booking";
      document.getElementById("cancelEditBtn").classList.add("hidden");
      document.getElementById("editModeLabel").classList.add("hidden");

    async function saveJob() {
      const client = document.getElementById("name").value.trim();
      const date = document.getElementById("date").value;
      const pickupTime = document.getElementById("pickupTime").value;
      const fromLoc = document.getElementById("from").value.trim();
      const toLoc = document.getElementById("to").value.trim();

      if (!client || !date || !fromLoc || !toLoc) {
        alert("Please fill Client Name, Pickup Date, From, and To.");
        return;
      }

const payload = {
        client: client,
        date: date,
        pickup_time: pickupTime || "",
        from_loc: fromLoc,
        to_loc: toLoc,
        stops: getStops(),
        job_type: document.getElementById("jobType").value,
        vehicle_type: document.getElementById("vehicleType").value,
        payment_type: document.getElementById("paymentType").value,
        status: document.getElementById("jobStatus").value,
        assigned_driver: document.getElementById("assignedDriver").value.trim(),
        waybill_notes: document.getElementById("waybillNotes").value.trim(),
        urgency_level: getUrgencyLevel(date, pickupTime)
      };

      let error;

      if (editingId) {
        ({ error } = await db.from("jobs").update(payload).eq("id", editingId));
      } else {
        ({ error } = await db.from("jobs").insert([payload]));
      }

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      alert(editingId ? "Updated!" : "Saved!");
      cancelEdit();
      await loadJobs();
      setTab("offers");
    }

    function clearForm() {
      document.getElementById("name").value = "";
      document.getElementById("date").value = "";
      document.getElementById("pickupTime").value = "";
      document.getElementById("from").value = "";
      document.getElementById("to").value = "";
      document.getElementById("jobType").value = "Airport Transfer";
      document.getElementById("vehicleType").value = "Premium SUV";
      document.getElementById("paymentType").value = "Cash";
      document.getElementById("jobStatus").value = "Offer";
      document.getElementById("assignedDriver").value = "";
      document.getElementById("waybillNotes").value = "";
    }

    async function updateStatus(jobId, currentStatus) {
      const nextStatus = getNextStatus(currentStatus);

      const { error } = await db
        .from("jobs")
        .update({ status: nextStatus })
        .eq("id", jobId);

      if (error) {
        alert("Status update failed: " + error.message);
        return;
      }

      await loadJobs();
    }

async function dispatchJob(jobId) {
  const job = allJobs.find(j => String(j.id) === String(jobId));
  if (!job) {
    alert("Job not found");
    return;
  }

  const currentDriver = job.assigned_driver || "";
  const newDriver = prompt("Assign / reassign driver for this job:", currentDriver);

  if (newDriver === null) return;

  const assignedDriver = String(newDriver).trim();
  if (!assignedDriver) {
    alert("Driver name is required");
    return;
  }

  const { error } = await db
    .from("jobs")
    .update({
      assigned_driver: assignedDriver,
      status: "Assigned"
    })
    .eq("id", jobId);

  if (error) {
    alert("Dispatch failed: " + error.message);
    return;
  }

  alert("Driver assigned successfully");
  await loadJobs();
}

 function renderJobs() {
  populateCounts();

  const search = (document.getElementById("searchInput")?.value || "").trim().toLowerCase();
  let jobs = getJobsForCurrentTab(allJobs);

  jobs = jobs.filter((j) => {
    const searchText = `${j.client || ""} ${j.from_loc || ""} ${j.to_loc || ""}`.toLowerCase();
    if (search && !searchText.includes(search)) return false;
    return true;
  });

  if (jobs.length === 0) {
    document.getElementById("jobs").innerHTML =
      `<div class="empty-state">No jobs in this section.</div>`;
    return;
  }

  let html = "";

  jobs.forEach((j) => {
    const urgency = getUrgencyLevel(j.date, j.pickup_time);
    const currentStatus = j.status || "Offer";

    html += `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="job-meta" style="color: var(--gold-soft); font-weight: 700;">
              ${escapeHtml(j.job_type || "OJO Luxe Service")}
            </div>
            <div class="client-name">${escapeHtml(j.client || "-")}</div>
            <div class="job-meta">${escapeHtml(j.date || "-")}${j.pickup_time ? ` • ${escapeHtml(j.pickup_time)}` : ""}</div>
            <div class="job-route">${escapeHtml(j.from_loc || "-")} → ${escapeHtml(j.to_loc || "-")}</div>
          </div>
        </div>

        ${Array.isArray(j.stops) && j.stops.length > 0 ? `
          <div class="job-line">
            <strong>Stops:</strong><br>
            ${j.stops.map(s => `📍 ${escapeHtml(s.address)}`).join("<br>")}
          </div>
        ` : ""}

        <div class="job-badges">
          <span class="badge">${escapeHtml(j.job_type || "Airport Transfer")}</span>
          <span class="badge">${escapeHtml(j.vehicle_type || j.vehicle || "-")}</span>
          <span class="badge">${escapeHtml(j.payment_type || "Cash")}</span>
          ${Array.isArray(j.stops) && j.stops.length > 0 ? `<span class="badge">${j.stops.length} Stops</span>` : ""}
          <span class="badge status-${normalizeClassName(currentStatus)}">${escapeHtml(currentStatus)}</span>
          <span class="badge urgency-${normalizeClassName(urgency)}">${escapeHtml(urgency)}</span>
        </div>

        <div class="job-line" style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div><strong>Status:</strong> ${escapeHtml(currentStatus)}</div>
          <div><strong>Urgency:</strong> ${escapeHtml(urgency)}</div>
        </div>

        <div class="job-driver">
          <strong>Driver:</strong>
          <span style="color:${j.assigned_driver ? '#87e18b' : '#aaa'}">
            ${escapeHtml(j.assigned_driver || "Unassigned")}
          </span>
        </div>

        <div class="job-note"><strong>Notes:</strong> ${escapeHtml(j.waybill_notes || "-")}</div>

        <div class="card-actions-3">
          <button class="small-btn secondary-btn" onclick="showWaybill('${j.id}')">Waybill</button>
          <button class="small-btn assign-btn" onclick="dispatchJob('${j.id}')">Dispatch</button>
          <button class="small-btn danger-btn" onclick="deleteJob('${j.id}')">Delete</button>
        </div>

        <div class="card-actions">
          <button class="small-btn secondary-btn" onclick="openNavMenu('${escapeHtml(j.from_loc || "").replace(/'/g, "\\'")}', 'Pickup')">Pickup Nav</button>
          <button class="small-btn secondary-btn" onclick="openNavMenu('${escapeHtml(j.to_loc || "").replace(/'/g, "\\'")}', 'Dropoff')">Dropoff Nav</button>
        </div>

        <div class="card-actions">
          <button class="small-btn secondary-btn" onclick="fillFormById('${j.id}')">Edit</button>
        </div>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

      async function loadJobs() {
  const { data, error } = await db
    .from("jobs")
    .select("*")
    .order("date", { ascending: true })
    .order("pickup_time", { ascending: true });

  if (error) {
    document.getElementById("jobs").innerHTML =
      `<div class="empty-state">Load error: ${escapeHtml(error.message)}</div>`;
    return;
  }

  allJobs = data || [];
  refreshDriverSuggestions(allJobs);
  renderJobs();
}

setActiveTabButton();
loadJobs();
  </script>
<!-- Dispatch Modal -->
<div id="dispatchModal" class="dispatch-overlay" onclick="handleOverlayClick(event)">
  <div class="dispatch-modal">
    <h3 id="dispatchModalTitle">Assign Driver</h3>
    <div class="dispatch-job-info" id="dispatchJobInfo"></div>
    <div class="dispatch-current-driver" id="dispatchCurrentDriver"></div>

    <div class="dispatch-input-wrap">
      <input
        id="dispatchDriverInput"
        type="text"
        placeholder="Type driver name..."
        autocomplete="off"
        oninput="renderDispatchSuggestions(this.value)"
        onkeydown="handleDispatchKey(event)"
        onblur="scheduleHideSuggestions()"
      />
      <ul id="dispatchSuggestions"></ul>
    </div>

    <div class="dispatch-actions">
      <button class="btn-dispatch-cancel" onclick="closeDispatchModal()">Cancel</button>
      <button class="btn-dispatch-confirm" onclick="confirmDispatch()">Confirm Assign</button>
    </div>
  </div>
</div>
</body>
</html>
